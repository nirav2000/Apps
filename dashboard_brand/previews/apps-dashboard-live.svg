<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" role="img" aria-label="GitHub Pages Super Dashboard animated preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071225"/>
      <stop offset="100%" stop-color="#0f2447"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b3158"/>
      <stop offset="100%" stop-color="#132443"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" rx="24" fill="url(#bg)"/>

  <rect x="32" y="28" width="736" height="64" rx="14" fill="#0b1d38" stroke="#2d4673"/>
  <text x="52" y="54" fill="#e9f1ff" font-family="Inter, Segoe UI, Arial" font-size="20" font-weight="700">GitHub Pages Super Dashboard</text>
  <text x="52" y="74" fill="#9db1d6" font-family="Inter, Segoe UI, Arial" font-size="12">One place to browse every GitHub Pages app</text>
  <circle cx="734" cy="60" r="14" fill="#173c70" stroke="#6ea6ff"/>
  <text x="728" y="65" fill="#e9f1ff" font-family="Inter, Segoe UI, Arial" font-size="15">⌕</text>

  <rect x="32" y="108" width="230" height="38" rx="10" fill="#0a1b34" stroke="#2d4673"/>
  <rect x="274" y="108" width="230" height="38" rx="10" fill="#0a1b34" stroke="#2d4673"/>
  <rect x="516" y="108" width="138" height="38" rx="10" fill="#0a1b34" stroke="#2d4673"/>
  <rect x="666" y="108" width="102" height="38" rx="10" fill="#4f95ff"/>
  <text x="53" y="132" fill="#9db1d6" font-family="Inter, Segoe UI, Arial" font-size="12">GitHub username</text>
  <text x="295" y="132" fill="#9db1d6" font-family="Inter, Segoe UI, Arial" font-size="12">Filter apps</text>
  <text x="535" y="132" fill="#9db1d6" font-family="Inter, Segoe UI, Arial" font-size="12">Sort</text>
  <text x="691" y="132" fill="#fff" font-family="Inter, Segoe UI, Arial" font-size="12" font-weight="700">Load</text>

  <g>
    <rect x="32" y="170" width="232" height="210" rx="14" fill="url(#card)" stroke="#325282"/>
    <rect x="284" y="170" width="232" height="210" rx="14" fill="url(#card)" stroke="#325282"/>
    <rect x="536" y="170" width="232" height="210" rx="14" fill="url(#card)" stroke="#325282"/>

    <rect x="32" y="170" width="232" height="116" rx="14" fill="#10284f"/>
    <rect x="284" y="170" width="232" height="116" rx="14" fill="#10284f"/>
    <rect x="536" y="170" width="232" height="116" rx="14" fill="#10284f"/>

    <rect x="52" y="298" width="84" height="26" rx="9" fill="#6dafff"/>
    <rect x="146" y="298" width="84" height="26" rx="9" fill="none" stroke="#4f73ab"/>

    <rect x="304" y="298" width="84" height="26" rx="9" fill="#6dafff"/>
    <rect x="398" y="298" width="84" height="26" rx="9" fill="none" stroke="#4f73ab"/>

    <rect x="556" y="298" width="84" height="26" rx="9" fill="#6dafff"/>
    <rect x="650" y="298" width="84" height="26" rx="9" fill="none" stroke="#4f73ab"/>
  </g>

  <rect x="0" y="168" width="800" height="2" fill="#7bb1ff" opacity="0.35">
    <animate attributeName="y" values="168;378;168" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="0" width="220" height="420" fill="url(#shine)" opacity="0.0">
    <animate attributeName="x" values="-260;840" dur="4.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.14;0" dur="4.8s" repeatCount="indefinite"/>
  </rect>
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
